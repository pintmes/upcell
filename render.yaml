services:
  - type: web
    name: upsellpro
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /auth/login
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_BILLING_TEST_MODE
        value: "false"
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SCOPES
        value: read_discounts,read_orders,read_products,read_script_tags,write_discounts,write_metaobject_definitions,write_metaobjects,write_orders,write_products,write_script_tags
      - key: DATABASE_URL
        value: file:/var/data/dev.sqlite
    disk:
      name: upsellpro-data
      mountPath: /var/data
      sizeGB: 1

